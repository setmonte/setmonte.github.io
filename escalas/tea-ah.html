<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário TEA/AH - Dupla Excepcionalidade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .dados-pessoais {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #4facfe;
        }

        .dados-pessoais h2 {
            color: #4facfe;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4facfe;
        }

        .bloco {
            margin-bottom: 30px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .bloco-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.3em;
            font-weight: 600;
        }

        .item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.3s;
        }

        .item:hover {
            background-color: #f8f9fa;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-texto {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #444;
            line-height: 1.5;
        }

        .opcoes {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .opcao {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .opcao:hover {
            background-color: #e3f2fd;
            border-color: #4facfe;
        }

        .opcao input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .opcao label {
            cursor: pointer;
            font-weight: 500;
            color: #555;
        }

        .observacoes {
            margin-top: 15px;
        }

        .observacoes textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            font-size: 14px;
        }

        .observacoes textarea:focus {
            outline: none;
            border-color: #4facfe;
        }

        .botoes {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-print {
            background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%);
            color: white;
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(156, 39, 176, 0.3);
        }

        .resultados {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
            border-left: 5px solid #4facfe;
            display: none;
        }

        .resultados h2 {
            color: #4facfe;
            margin-bottom: 20px;
            text-align: center;
        }

        .resultado-bloco {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .resultado-nome {
            font-weight: 600;
            color: #333;
        }

        .resultado-pontos {
            font-size: 1.2em;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
        }

        .total-geral {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .interpretacao {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #4facfe;
            text-align: center;
        }

        .interpretacao h3 {
            color: #4facfe;
            margin-bottom: 15px;
        }

        .interpretacao-texto {
            font-size: 1.1em;
            line-height: 1.6;
            color: #555;
        }

        .analise {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #2196f3;
        }

        .analise h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .salvar-emergencia {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff9800;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
            z-index: 1000;
        }

        .salvar-emergencia:hover {
            background: #f57c00;
            transform: translateY(-2px);
        }

        @media print {
            body {
                background: white;
                padding: 2mm;
                font-size: 12px;
            }
            
            .container {
                box-shadow: none;
                border-radius: 0;
                max-width: 95%;
                margin: 0 auto;
            }
            
            .header {
                background: white !important;
                color: black !important;
                border-bottom: 2px solid #333;
            }
            
            .botoes, .salvar-emergencia {
                display: none !important;
            }
            
            .opcoes input[type="radio"] {
                width: 25px;
                height: 25px;
                border: 2px solid #333;
                background: white;
            }
            
            .bloco-header {
                background: white !important;
                color: black !important;
                border-bottom: 2px solid #333;
            }
            
            .form-group input, .form-group select, .observacoes textarea {
                border: 1px solid #333;
                background: white;
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .content {
                padding: 20px;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .opcoes {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .botoes {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
    <script src="../id-paciente.js"></script>
</head>
<body>
<div style="padding:10px 20px;background:#2e7d32;"><a href="../" style="display:inline-block;background:#fff;color:#2e7d32;text-decoration:none;font-family:Segoe UI,Arial,sans-serif;font-size:14px;font-weight:bold;padding:8px 20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:background 0.2s;">&#11013; Voltar ao In&#237;cio</a></div>
    <button class="salvar-emergencia" onclick="salvarDadosManual()">🚨 Salvar</button>
    
    <div class="container">
        <div class="header">
            <h1>🧠 Questionário TEA/AH</h1>
            <p>Avaliação de Dupla Excepcionalidade</p>
        </div>

        <div class="content">
            <div class="botoes">
                <button class="btn btn-print" onclick="imprimirEscala()">🖨️ Imprimir Escala para Papel</button>
            </div>

            <div class="dados-pessoais">
                <h2>📋 Dados Pessoais</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" placeholder="Digite o nome completo">
                    </div>
                    <div class="form-group">
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" min="1" max="100" placeholder="Anos">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sexo">Sexo:</label>
                        <select id="sexo">
                            <option value="">Selecione</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="data">Data da Avaliação:</label>
                        <input type="date" id="data">
                    </div>
                </div>
            </div>

            <div id="questionario">
                <!-- Blocos serão inseridos aqui pelo JavaScript -->
            </div>

            <div class="botoes">
                <button class="btn btn-primary" onclick="calcularResultados()">📊 Calcular Resultados</button>
                <button class="btn btn-secondary" onclick="gerarRelatorioPDF()">📄 Gerar Relatório PDF</button>
                <button class="btn btn-danger" onclick="limparDados()">🗑️ Limpar Dados</button>
            </div>

            <div id="resultados" class="resultados">
                <!-- Resultados serão inseridos aqui -->
            </div>
        </div>
    </div>

    <script>
        // Dados do questionário
        const questionario = {
            "1. Processamento Sensorial": [
                "Demonstra incômodo com etiquetas, tecidos ou sapatos",
                "Reage de forma intensa a sons (barulho, vozes, aspirador, música alta)",
                "Evita lugares com muitas pessoas ou muito estímulo visual",
                "É muito seletiva com alimentos por textura, cor ou cheiro",
                "Procura movimentos repetitivos (balançar, girar, pular)"
            ],
            "2. Comunicação e Linguagem": [
                "Usou frases completas cedo (antes dos 2 anos e meio)",
                "Usa linguagem literal (entende tudo ao pé da letra)",
                "Fala de seus interesses de forma intensa e repetitiva",
                "Entende piadas, metáforas ou ironias",
                "Corrige adultos ou se frustra quando algo é 'injusto' ou 'errado'"
            ],
            "3. Interação Social": [
                "Prefere brincar sozinha",
                "Se aproxima de outras crianças com facilidade",
                "Demonstra empatia (percebe quando alguém está triste ou bravo)",
                "Tem amigos ou vínculos sociais estáveis",
                "Se desregula em ambientes sociais (escola, festas, recreio)"
            ],
            "4. Cognição e Interesses": [
                "Aprende rápido e faz perguntas complexas para a idade",
                "Se interessa intensamente por um tema específico",
                "Demonstra criatividade ou ideias originais",
                "Se irrita quando erra ou quando algo é 'fácil demais'",
                "Transfere o que aprende para novas situações"
            ],
            "5. Regulação Emocional": [
                "Se desorganiza quando há mudanças inesperadas",
                "Chora ou se isola após frustrações",
                "Consegue nomear o que sente",
                "Mostra necessidade de rotina e previsibilidade",
                "Reage mal à crítica ou quando é contrariado"
            ],
            "6. Desempenho Global": [
                "Demonstra curiosidade intensa e pensamento avançado",
                "Mostra sensibilidade emocional e/ou artística elevada",
                "Apresenta descompasso entre desempenho intelectual e social",
                "Mostra habilidades notáveis em uma área e dificuldades em outra"
            ]
        };

        // Gerar questionário
        function gerarQuestionario() {
            const container = document.getElementById('questionario');
            let html = '';
            let itemIndex = 0;

            Object.keys(questionario).forEach(bloco => {
                html += `
                    <div class="bloco">
                        <div class="bloco-header">${bloco}</div>
                `;

                questionario[bloco].forEach(item => {
                    html += `
                        <div class="item">
                            <div class="item-texto">${item}</div>
                            <div class="opcoes">
                                <div class="opcao">
                                    <input type="radio" id="item${itemIndex}_0" name="item${itemIndex}" value="0">
                                    <label for="item${itemIndex}_0">0 - Nunca</label>
                                </div>
                                <div class="opcao">
                                    <input type="radio" id="item${itemIndex}_1" name="item${itemIndex}" value="1">
                                    <label for="item${itemIndex}_1">1 - Raramente</label>
                                </div>
                                <div class="opcao">
                                    <input type="radio" id="item${itemIndex}_2" name="item${itemIndex}" value="2">
                                    <label for="item${itemIndex}_2">2 - Frequentemente</label>
                                </div>
                                <div class="opcao">
                                    <input type="radio" id="item${itemIndex}_3" name="item${itemIndex}" value="3">
                                    <label for="item${itemIndex}_3">3 - Sempre</label>
                                </div>
                            </div>
                            <div class="observacoes">
                                <textarea placeholder="Observações do cuidador (opcional)" id="obs${itemIndex}"></textarea>
                            </div>
                        </div>
                    `;
                    itemIndex++;
                });

                html += '</div>';
            });

            container.innerHTML = html;
        }

        // Calcular resultados
        function calcularResultados() {
            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const sexo = document.getElementById('sexo').value;

            if (!nome || !idade || !sexo) {
                alert('Por favor, preencha todos os dados pessoais antes de calcular.');
                return;
            }

            const resultados = {};
            let totalGeral = 0;
            let itemIndex = 0;

            Object.keys(questionario).forEach(bloco => {
                let pontuacaoBloco = 0;
                
                questionario[bloco].forEach(item => {
                    const resposta = document.querySelector(`input[name="item${itemIndex}"]:checked`);
                    if (resposta) {
                        pontuacaoBloco += parseInt(resposta.value);
                    }
                    itemIndex++;
                });

                resultados[bloco] = pontuacaoBloco;
                totalGeral += pontuacaoBloco;
            });

            mostrarResultados(resultados, totalGeral);
        }

        // Mostrar resultados
        function mostrarResultados(resultados, totalGeral) {
            const container = document.getElementById('resultados');
            let html = '<h2>📊 Resultados da Avaliação</h2>';

            // Resultados por bloco
            Object.keys(resultados).forEach(bloco => {
                const pontos = resultados[bloco];
                const cor = getCorPontuacao(pontos);
                
                html += `
                    <div class="resultado-bloco">
                        <span class="resultado-nome">${bloco}</span>
                        <span class="resultado-pontos" style="background-color: ${cor}">${pontos} pontos</span>
                    </div>
                `;
            });

            // Total geral
            html += `
                <div class="total-geral">
                    <h3>Pontuação Total: ${totalGeral} pontos</h3>
                </div>
            `;

            // Interpretação
            const interpretacao = getInterpretacao(totalGeral, resultados);
            html += `
                <div class="interpretacao">
                    <h3>🎯 Interpretação</h3>
                    <div class="interpretacao-texto">${interpretacao.texto}</div>
                </div>
            `;

            // Análise
            const analise = getAnalise(resultados);
            html += `
                <div class="analise">
                    <h4>📋 Análise Detalhada</h4>
                    <p>${analise}</p>
                </div>
            `;

            container.innerHTML = html;
            container.style.display = 'block';
        }

        // Obter cor baseada na pontuação
        function getCorPontuacao(pontos) {
            if (pontos <= 3) return '#4caf50'; // Verde
            if (pontos <= 6) return '#ff9800'; // Laranja
            if (pontos <= 9) return '#f44336'; // Vermelho
            return '#9c27b0'; // Roxo
        }

        // Obter interpretação
        function getInterpretacao(total, resultados) {
            if (total >= 45) {
                return {
                    texto: "Forte indicativo de Dupla Excepcionalidade (TEA + Altas Habilidades). Recomenda-se avaliação neuropsicológica especializada urgente."
                };
            } else if (total >= 30) {
                return {
                    texto: "Indicativo moderado de Dupla Excepcionalidade. Sugere-se acompanhamento especializado e avaliação mais aprofundada."
                };
            } else if (total >= 15) {
                return {
                    texto: "Alguns sinais de características atípicas. Recomenda-se monitoramento e possível consulta com especialista."
                };
            } else {
                return {
                    texto: "Perfil dentro dos parâmetros típicos. Continuar acompanhamento regular do desenvolvimento."
                };
            }
        }

        // Obter análise detalhada
        function getAnalise(resultados) {
            let analise = "Áreas de destaque: ";
            let areasAltas = [];
            
            Object.keys(resultados).forEach(bloco => {
                if (resultados[bloco] >= 8) {
                    areasAltas.push(bloco);
                }
            });

            if (areasAltas.length > 0) {
                analise += areasAltas.join(", ") + ". ";
                analise += "Essas áreas apresentam pontuações elevadas e merecem atenção especializada. ";
            } else {
                analise += "Nenhuma área apresentou pontuação significativamente elevada. ";
            }

            if (areasAltas.length >= 3) {
                analise += "A presença de múltiplas áreas com pontuação alta sugere necessidade de avaliação multidisciplinar.";
            }

            return analise;
        }

        // Gerar relatório PDF
        function gerarRelatorioPDF() {
            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const sexo = document.getElementById('sexo').value;
            const data = document.getElementById('data').value || new Date().toLocaleDateString('pt-BR');

            if (!nome) {
                alert('Por favor, preencha pelo menos o nome antes de gerar o relatório.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Cabeçalho
            doc.setFillColor(79, 172, 254);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.setFont(undefined, 'bold');
            doc.text('QUESTIONÁRIO TEA/AH - DUPLA EXCEPCIONALIDADE', 105, 20, { align: 'center' });
            doc.setFontSize(12);
            doc.text('Relatório de Avaliação', 105, 30, { align: 'center' });

            // Dados pessoais
            doc.setFillColor(248, 249, 250);
            doc.rect(20, 50, 170, 30, 'F');
            doc.setDrawColor(79, 172, 254);
            doc.rect(20, 50, 170, 30);
            doc.setTextColor(79, 172, 254);
            doc.setFontSize(14);
            doc.setFont(undefined, 'bold');
            doc.text('DADOS PESSOAIS', 25, 60);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(11);
            doc.setFont(undefined, 'normal');
            doc.text(`Nome: ${nome}`, 25, 70);
            doc.text(`Idade: ${idade} anos`, 120, 70);
            doc.text(`Sexo: ${sexo}`, 25, 75);
            doc.text(`Data: ${data}`, 120, 75);

            // Calcular resultados para o PDF
            const resultados = {};
            let totalGeral = 0;
            let itemIndex = 0;

            Object.keys(questionario).forEach(bloco => {
                let pontuacaoBloco = 0;
                
                questionario[bloco].forEach(item => {
                    const resposta = document.querySelector(`input[name="item${itemIndex}"]:checked`);
                    if (resposta) {
                        pontuacaoBloco += parseInt(resposta.value);
                    }
                    itemIndex++;
                });

                resultados[bloco] = pontuacaoBloco;
                totalGeral += pontuacaoBloco;
            });

            // Resultados
            doc.setFillColor(76, 175, 80);
            doc.rect(20, 90, 170, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            doc.text('RESULTADOS POR ÁREA', 25, 97);

            let yPos = 110;
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            Object.keys(resultados).forEach(bloco => {
                doc.text(`${bloco}: ${resultados[bloco]} pontos`, 25, yPos);
                yPos += 8;
            });

            // Total
            doc.setFillColor(79, 172, 254);
            doc.rect(20, yPos + 5, 170, 15, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.setFont(undefined, 'bold');
            doc.text(`PONTUAÇÃO TOTAL: ${totalGeral} PONTOS`, 105, yPos + 15, { align: 'center' });

            // Interpretação
            yPos += 30;
            doc.setFillColor(255, 193, 7);
            doc.rect(20, yPos, 170, 10, 'F');
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.setFont(undefined, 'bold');
            doc.text('INTERPRETAÇÃO', 25, yPos + 7);

            yPos += 20;
            const interpretacao = getInterpretacao(totalGeral, resultados);
            doc.setFontSize(10);
            doc.setFont(undefined, 'normal');
            const linhasInterpretacao = doc.splitTextToSize(interpretacao.texto, 160);
            doc.text(linhasInterpretacao, 25, yPos);

            // Análise
            yPos += linhasInterpretacao.length * 5 + 15;
            const analise = getAnalise(resultados);
            const linhasAnalise = doc.splitTextToSize(analise, 160);
            doc.text(linhasAnalise, 25, yPos);

            // Rodapé
            doc.setFillColor(108, 117, 125);
            doc.rect(0, 280, 210, 17, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(8);
            doc.text(`Relatório gerado em: ${new Date().toLocaleString('pt-BR')}`, 105, 290, { align: 'center' });

            // Salvar PDF
            const nomeArquivo = `TEA-AH-${nome.replace(/\s+/g, '')}-${new Date().toISOString().slice(0,10)}.pdf`;
            doc.save(nomeArquivo);
        }

        // Limpar dados
        function limparDados() {
            if (confirm('Tem certeza que deseja limpar todos os dados? Esta ação não pode ser desfeita.')) {
                document.getElementById('nome').value = '';
                document.getElementById('idade').value = '';
                document.getElementById('sexo').value = '';
                document.getElementById('data').value = '';
                
                // Limpar todas as respostas
                document.querySelectorAll('input[type="radio"]').forEach(radio => {
                    radio.checked = false;
                });
                
                // Limpar observações
                document.querySelectorAll('textarea').forEach(textarea => {
                    textarea.value = '';
                });
                
                // Ocultar resultados
                document.getElementById('resultados').style.display = 'none';
                
                alert('Dados limpos com sucesso!');
            }
        }

        // Imprimir escala
        function imprimirEscala() {
            // Salvar dados atuais
            const dadosAtuais = {
                nome: document.getElementById('nome').value,
                idade: document.getElementById('idade').value,
                sexo: document.getElementById('sexo').value,
                data: document.getElementById('data').value
            };
            
            const respostasAtuais = {};
            document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                respostasAtuais[radio.name] = radio.value;
            });
            
            const observacoesAtuais = {};
            document.querySelectorAll('textarea').forEach(textarea => {
                observacoesAtuais[textarea.id] = textarea.value;
            });
            
            // Limpar para impressão
            document.getElementById('nome').value = '';
            document.getElementById('idade').value = '';
            document.getElementById('sexo').value = '';
            document.getElementById('data').value = '';
            
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.checked = false;
            });
            
            document.querySelectorAll('textarea').forEach(textarea => {
                textarea.value = '';
            });
            
            document.getElementById('resultados').style.display = 'none';
            
            // Imprimir
            window.print();
            
            // Restaurar dados
            setTimeout(() => {
                document.getElementById('nome').value = dadosAtuais.nome;
                document.getElementById('idade').value = dadosAtuais.idade;
                document.getElementById('sexo').value = dadosAtuais.sexo;
                document.getElementById('data').value = dadosAtuais.data;
                
                Object.keys(respostasAtuais).forEach(name => {
                    const radio = document.querySelector(`input[name="${name}"][value="${respostasAtuais[name]}"]`);
                    if (radio) radio.checked = true;
                });
                
                Object.keys(observacoesAtuais).forEach(id => {
                    const textarea = document.getElementById(id);
                    if (textarea) textarea.value = observacoesAtuais[id];
                });
            }, 1000);
        }

        // Salvar dados manual
        function salvarDadosManual() {
            const dados = {
                nome: document.getElementById('nome').value,
                idade: document.getElementById('idade').value,
                sexo: document.getElementById('sexo').value,
                data: document.getElementById('data').value,
                respostas: {},
                observacoes: {}
            };
            
            document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                dados.respostas[radio.name] = radio.value;
            });
            
            document.querySelectorAll('textarea').forEach(textarea => {
                if (textarea.value) {
                    dados.observacoes[textarea.id] = textarea.value;
                }
            });
            
            const dataStr = JSON.stringify(dados, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `TEA-AH-Backup-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('Dados salvos com sucesso!');
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            gerarQuestionario();
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
            
            // Salvamento automático a cada 30 segundos
            setInterval(() => {
                const nome = document.getElementById('nome').value;
                if (nome) {
                    localStorage.setItem('tea_ah_backup', JSON.stringify({
                        timestamp: new Date().toISOString(),
                        nome: nome,
                        idade: document.getElementById('idade').value,
                        sexo: document.getElementById('sexo').value,
                        data: document.getElementById('data').value
                    }));
                }
            }, 30000);
        });
    </script>
</body>
