<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECFE Online - Teste em Andamento</title>
  <link rel="stylesheet" href="tecfe-v7-styles.css">
  <script src="libs/jspdf.umd.min.js"></script>
  <script src="libs/jspdf.plugin.autotable.min.js"></script>
  <style>
    #activationPage { display: none !important; }
    #coverPage { display: none !important; }
    body { margin: 0; padding: 0; background: #f0f0f0; }
    #testPage {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      width: 100% !important;
      min-height: 100vh !important;
      padding: 10px !important;
    }
    #testPage h1 { text-align: center; width: 100%; }
    .stimulus-container { justify-content: center !important; }
    .response-container { justify-content: center !important; flex-wrap: wrap !important; }
    #exitButton {
      position: fixed !important;
      bottom: 20px !important;
      right: 20px !important;
      left: auto !important;
      z-index: 99999 !important;
      background: rgba(200,0,0,0.7) !important;
      color: #fff !important;
      border: none !important;
      padding: 10px 20px !important;
      border-radius: 8px !important;
      font-size: 14px !important;
      cursor: pointer !important;
    }
  </style>
</head>
<body>

  <!-- PAGINA DO TESTE -->
  <div id="testPage" style="display:block;">
    <h1>TECFE Online <span id="testVersion">v7</span></h1>
    <div class="stimulus-container" id="stimulusCards">
      <div class="card droppable" data-cor="vermelho" data-forma="triangulo" data-numero="1">
        <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="600" fill="#fff"/>
          <polygon points="200,220 140,340 260,340" fill="red"/>
        </svg>
      </div>
      <div class="card droppable" data-cor="verde" data-forma="estrela" data-numero="2">
        <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="600" fill="#fff"/>
          <g transform="translate(100,200) scale(1.6)"><polygon fill="green" points="0,-50 14.7,-15.9 47.6,-15.9 22.1,7.6 29.4,42.3 0,20 -29.4,42.3 -22.1,7.6 -47.6,-15.9 -14.7,-15.9"/></g>
          <g transform="translate(300,400) scale(1.6)"><polygon fill="green" points="0,-50 14.7,-15.9 47.6,-15.9 22.1,7.6 29.4,42.3 0,20 -29.4,42.3 -22.1,7.6 -47.6,-15.9 -14.7,-15.9"/></g>
        </svg>
      </div>
      <div class="card droppable" data-cor="amarelo" data-forma="cruz" data-numero="3">
        <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="600" fill="#fff"/>
          <g transform="translate(60,100)"><rect x="-20" y="-50" width="40" height="100" fill="yellow"/><rect x="-50" y="-20" width="100" height="40" fill="yellow"/></g>
          <g transform="translate(340,100)"><rect x="-20" y="-50" width="40" height="100" fill="yellow"/><rect x="-50" y="-20" width="100" height="40" fill="yellow"/></g>
          <g transform="translate(200,500)"><rect x="-20" y="-50" width="40" height="100" fill="yellow"/><rect x="-50" y="-20" width="100" height="40" fill="yellow"/></g>
        </svg>
      </div>
      <div class="card droppable" data-cor="azul" data-forma="circulo" data-numero="4">
        <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="600" fill="#fff"/>
          <circle cx="60" cy="100" r="40" fill="blue"/>
          <circle cx="340" cy="100" r="40" fill="blue"/>
          <circle cx="60" cy="500" r="40" fill="blue"/>
          <circle cx="340" cy="500" r="40" fill="blue"/>
        </svg>
      </div>
    </div>
    <div class="response-container" id="responseCards"></div>
    <div id="feedback"></div>
  </div>

  <button id="exitButton" onclick="exitOnlineTest()">Sair</button>

  <script src="tecfe-v7-cards.js"></script>
  <script src="tecfe-v7-ui.js"></script>
  <script src="tecfe-v7-engine.js"></script>
  <script src="tecfe-v7-ai.js"></script>
  <script src="tecfe-v7-pdf.js"></script>
  <script>
    var API_URL = 'https://dguom5dfla.execute-api.sa-east-1.amazonaws.com';
    var sessionData = {};
    var deck = [];
    try {
      var params = new URLSearchParams(window.location.search);
      var d = params.get('d');
      if (d) sessionData = JSON.parse(atob(decodeURIComponent(d)));
    } catch(e) {}

    if (!sessionData.sessionId) {
      document.body.innerHTML = '<div style="text-align:center;padding:50px;font-size:18px;color:#c62828;">Link invalido ou expirado.<br>Solicite um novo link ao seu avaliador.</div>';
    }

    window.onload = function() {
      if (!sessionData.sessionId) return;
      window._fd = {
        patientName: sessionData.patientName || '',
        birthDate: sessionData.birthDate || '',
        cpf: sessionData.cpf || '',
        sex: sessionData.sex || '',
        laterality: sessionData.laterality || '',
        education: sessionData.education || '',
        evaluator: sessionData.evaluator || '',
        crp: sessionData.crp || '',
        age: WCSTUI.calculateAge(sessionData.birthDate || '')
      };
      // Gerar baralho e guardar no state do engine
      deck = WCSTCards.shuffle(WCSTCards.buildDeck());
      WCSTEngine.reset();
      WCSTEngine.state.currentDeck = deck;
      WCSTEngine.state.isActive = true;
      WCSTEngine.state.startTimestamp = Date.now();
      // Configurar clique nos modelos
      WCSTUI.setupClickMatch('#stimulusCards .card', handleMatch);
      renderDeck();
      window._startTime = Date.now();
      document.getElementById('exitButton').style.display = 'block';
    };

    function renderDeck() {
      var container = document.getElementById('responseCards');
      container.innerHTML = '';
      var start = WCSTEngine.state.cardIndex;
      var d = WCSTEngine.state.currentDeck;
      for (var i = start; i < d.length; i++) {
        var el = WCSTUI.createResponseCard(d[i], i);
        container.appendChild(el);
      }
    }

    function handleMatch(selectedCard, targetCard) {
      if (!WCSTEngine.state.isActive) return;
      var selCor = selectedCard.dataset.cor;
      var selForma = selectedCard.dataset.forma;
      var selNumero = selectedCard.dataset.numero;
      var targetCor = targetCard.dataset.cor;
      var targetForma = targetCard.dataset.forma;
      var targetNumero = targetCard.dataset.numero;
      if (!selCor || !selForma || !selNumero) return;
      var rt = (Date.now() - (window._lastCardTime || window._startTime)) / 1000;
      window._lastCardTime = Date.now();

      var outcome = WCSTEngine.processTrial(
        selCor, selForma, selNumero,
        targetCor, targetForma, targetNumero,
        rt
      );

      if (outcome.result.correct) {
        showOnlineFeedback('Acertou!!!', '#2e7d32');
      } else {
        showOnlineFeedback('Errou!!!', '#c62828');
      }

      selectedCard.remove();

      // Troca de baralho
      if (outcome.needNewDeck) {
        var newDeck = WCSTCards.shuffle(WCSTCards.buildDeck());
        WCSTEngine.state.currentDeck = newDeck;
        renderDeck();
      }

      // Teste terminou
      if (outcome.testEnded) {
        finishTest(outcome.completedAll ? 'completo' : 'parcial');
      }
    }

    async function finishTest(status) {
      WCSTEngine.state.isActive = false;
      var stats = WCSTEngine.computeStats();
      var elapsed = Date.now() - window._startTime;
      stats.tempo = Math.floor(elapsed/60000) + 'min ' + Math.floor((elapsed%60000)/1000) + 's';
      stats.status = status;
      var fd = window._fd;
      // Salvar resultado na API (sem gerar PDF - o avaliador gera no painel)
      try {
        await fetch(API_URL + '/save-result', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: sessionData.sessionId, email: sessionData.email, data: { stats: stats, formData: fd, status: status, date: new Date().toISOString() } })
        });
      } catch(e) {}
      // Mostrar tela de encerramento
      document.getElementById('testPage').style.display = 'none';
      document.getElementById('exitButton').style.display = 'none';
      var msg = status === 'completo' ? 'Teste finalizado com sucesso!' : status === 'abandonado' ? 'Teste encerrado.' : 'Teste finalizado.';
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);text-align:center;padding:20px;"><img src="l.png" style="height:80px;margin-bottom:20px;"><h1 style="color:#2e7d32;font-size:28px;margin-bottom:10px;">' + msg + '</h1><p style="font-size:16px;color:#555;margin-bottom:5px;">Obrigado pela sua participacao.</p><p style="font-size:16px;color:#555;">Os resultados foram enviados ao avaliador.</p><p style="margin-top:30px;font-size:14px;color:#888;">Voce pode fechar esta janela.</p></div>';
    }

    function showOnlineFeedback(text, color) {
      var fb = document.getElementById('feedback');
      fb.textContent = text;
      fb.style.cssText = 'display:block !important;position:fixed !important;top:50% !important;left:50% !important;transform:translate(-50%,-50%) !important;font-size:48px !important;font-weight:bold !important;color:' + color + ' !important;z-index:99999 !important;background:rgba(255,255,255,0.95) !important;padding:20px 40px !important;border-radius:12px !important;box-shadow:0 4px 20px rgba(0,0,0,0.3) !important;text-align:center !important;pointer-events:none !important;';
      setTimeout(function() { fb.style.display = 'none'; }, 1000);
    }

    function exitOnlineTest() {
      if (confirm('Deseja realmente sair? O teste sera registrado como abandonado.')) finishTest('abandonado');
    }
  </script>
</body>
</html>
